			<stop offset=".48" stop-color="#e5a34e" stop-opacity=".58"/>
			<stop offset="1" stop-color="#e5a34e" stop-opacity="0"/>
		</radialGradient>
		<filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="12"/>
		</filter>
	</defs>

