			<stop offset=".42" stop-color="#516f87"/>
			<stop offset=".76" stop-color="#a8b8be"/>
			<stop offset="1" stop-color="#e5ded0"/>
		</linearGradient>
		<linearGradient id="lake" x1="0" x2="0" y1="0" y2="1">
			<stop offset="0" stop-color="#889ca2"/>
			<stop offset=".52" stop-color="#5d747f"/>
