		<linearGradient id="snow" x1="0" x2="0" y1="0" y2="1">
			<stop offset="0" stop-color="#fffaf1"/>
			<stop offset="1" stop-color="#cad9dd"/>
		</linearGradient>
		<radialGradient id="tentGlow" cx="50%" cy="54%" r="54%">
